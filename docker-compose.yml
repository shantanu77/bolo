version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bolo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bolo_root_pass
      MYSQL_DATABASE: bolo_english
      MYSQL_USER: bolo_user
      MYSQL_PASSWORD: bolo_pass
    ports:
      - '3306:3306'
    volumes:
      - bolo_mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'bolo_user', '-pbolo_pass']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bolo_mysql_data:
